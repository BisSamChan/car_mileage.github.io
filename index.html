<<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>救助37期車輛里程</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 500px; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { background-color: #f57c00; color: white; padding: 15px; text-align: center; font-weight: bold; }
        .form-group { padding: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; background-color:  #f57c00; color: white; padding: 15px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">⏲️救助訓車輛里程</div>
    <form action="https://formspree.io" method="POST" class="form-group">
        
        <label>1. 車輛</label>
        <select name="type" id="carSelect" onchange="fetchSheetData()">
        <option value="">請選擇車輛...</option>
        <option value="福安巴">福安巴</option>
        <option value="南港92">南港92</option>
        </select>
        
        <label>2. 訓練日期時間</label>
        <input type="datetime-local" name="date_time">
        
        <label>3. 地點</label>
        <input type="text" name="" placeholder="訓練地點">
       
        <label>4. 起始里程</label>
       <input type="text" name="star_mileage" id="startMileage" placeholder="自動抓取中...">

        <label>5. 結束里程</label>
        <input type="text" name="end_mileage" placeholder="填數字_別亂填">

        <label>6. 駕駛人</label>
        <input type="text" name="driver_name" placeholder="台9線車神">

        <button type="submit">確定送出 ＞</button>

        
    </form>
</div>

    <script>
async function fetchSheetData() {
    const carName = document.getElementById('carSelect').value;
    const startInput = document.getElementById('startMileage');

    if (!carName) return;

    // 顯示讀取中狀態
    startInput.placeholder = "載入中...";
    startInput.value = "";

    // 【重要】請將下方網址替換成你在 Google Apps Script 部署得到的「網頁應用程式網址」
    const scriptUrl = "https://script.google.com/macros/s/AKfycbxqqjNsFCgFtptMh_kAONl1JGdTyXj4TQhsb4tq0X_0yKMaIH9cb3vFncY2xLXkn1xQCA/exec";

    try {
        const response = await fetch(`${scriptUrl}?name=${encodeURIComponent(carName)}`);
        const data = await response.json();

        if (data.lastMileage) {
            // 自動將 Sheet 的「結束里程」填入 HTML 的「起始里程」
            startInput.value = data.lastMileage;
        }
    } catch (error) {
        console.error("抓取資料失敗:", error);
        startInput.placeholder = "抓取失敗，請手動輸入";
    }
}
</script>
    
</body>
</html>
