<<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>救助37期車輛里程</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 500px; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { background-color: #f57c00; color: white; padding: 15px; text-align: center; font-weight: bold; }
        .form-group { padding: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; background-color:  #f57c00; color: white; padding: 15px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">⏲️救助訓車輛里程</div>
    <form  id="mileageForm" class="form-group">
        
        <label>1. 車輛</label>
        <select name="type" id="carSelect" onchange="fetchSheetData()">
        <option value="">請選擇車輛...</option>
        <option value="福安巴">福安巴</option>
        <option value="南港92">南港92</option>
        <option value="中正勤務車">中正勤務車</option>   
        </select>
        
        <label>2. 訓練日期</label>
        <input type="date" name="training_date">

        <!-- 開始與結束時間並排 -->
        <div style="display: flex; gap: 10px;">
        <div style="flex: 1;">
        <label>開始時間</label>
        <input type="time" name="start_time">
        </div>
        <div style="flex: 1;">
        <label>結束時間</label>
        <input type="time" name="end_time">
        </div>
        </div>
        
        
        <label>3. 地點</label>
        <input type="text" id="location" name="location" placeholder="訓練地點">
       
        <label>4. 起始里程</label>
       <input type="text" name="star_mileage" id="startMileage" placeholder="自動抓取中...">

        <label>5. 結束里程</label>
        <input type="text" name="end_mileage" placeholder="結束里程">

        <label>6. 駕駛人</label>
        <input type="text" name="driver_name" placeholder="駕駛人">

        <button type="submit">確定送出 ＞</button>

        
    </form>
</div>

   <script>
    // 你的 Google Apps Script 網址
    const scriptUrl = "https://script.google.com/macros/s/AKfycbzldeX_pDpEKXBPDh5b7qD609PJMYbXUdik_lGskD4fvaRGtoBxTjiJp1NjrCS05e4CIg/exec";

    // --- 功能 A：選擇車輛後自動抓取里程 ---
    async function fetchSheetData() {
        const carName = document.getElementById('carSelect').value;
        const startInput = document.getElementById('startMileage');

        if (!carName) return;

        startInput.placeholder = "載入中...";
        startInput.value = "";

        try {
            const response = await fetch(`${scriptUrl}?name=${encodeURIComponent(carName)}`);
            const data = await response.json();
            if (data.lastMileage) {
                startInput.value = data.lastMileage;
            }
        } catch (error) {
            console.error("抓取失敗:", error);
            startInput.placeholder = "抓取失敗，請手動輸入";
        }
    }

    // --- 功能 B：按下「確定送出」後寫入 Google Sheet ---
    document.getElementById('mileageForm').addEventListener('submit', async function(e) {
        e.preventDefault(); // 阻止表單跳轉

        const submitBtn = e.target.querySelector('button');
        submitBtn.innerText = "傳送中...";
        submitBtn.disabled = true;

        // 收集表單內所有資料
       const formData = {
       type: document.getElementById('carSelect').value,
       training_date: document.getElementsByName('training_date')[0].value, // 新增日期
       start_time: document.getElementsByName('start_time')[0].value,       // 新增開始時間
       end_time: document.getElementsByName('end_time')[0].value,           // 新增結束時間
       location: document.getElementById('location').value,
       star_mileage: document.getElementById('startMileage').value,
       end_mileage: document.getElementsByName('end_mileage')[0].value,
       driver_name: document.getElementsByName('driver_name')[0].value
};

        try {
            // 使用 POST 發送資料
            await fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors', // 避開瀏覽器跨網域限制
                cache: 'no-cache',
                body: JSON.stringify(formData)
            });

            alert("✅ 資料已成功上傳至 Google Sheet！");
            location.reload(); // 成功後重新整理頁面，清空欄位
        } catch (error) {
            console.error("送出失敗:", error);
            alert("❌ 送出失敗，請確認網路或腳本設定");
        } finally {
            submitBtn.innerText = "確定送出 ＞";
            submitBtn.disabled = false;
        }
    });
</script>
    
</body>
</html>
